{% extends "base.html" %}
{% block content %}

<h2>{{ genre }} Movies 🎬</h2>

<div class="movie-list">
    {% for movie in movies %}
        <div class="movie-card">
            {% if movie.poster_path %}
                <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" width="150">
            {% endif %}
            <h4>{{ movie.title }}</h4>
            <p>⭐ {{ movie.vote_average }}</p>
        </div>
    {% endfor %}
</div>

<a href="/">⬅ Back</a>

{% endblock %}
